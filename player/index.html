<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuxPlayer</title>

  <!--
    ============================================================
    LuxPlayer — index.html
    ------------------------------------------------------------
    Purpose : Shell page that loads hls.js, the player stylesheet,
              and the player JavaScript module.  Swap out the
              <source> / data-src attribute below to point at any
              MP4 or HLS (.m3u8) stream.
    ============================================================
  -->

  <!-- Player stylesheet -->
  <link rel="stylesheet" href="player.css" />

  <!--
    hls.js CDN — lightweight HLS parser that works in every modern
    browser.  No ad scripts, no trackers — purely functional.
  -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
</head>
<body>

  <!--
    ============================================================
    PLAYER WRAPPER
    ------------------------------------------------------------
    data-src  : The video URL to load.  Supports:
                  • Direct MP4   →  "https://example.com/movie.mp4"
                  • HLS stream   →  "https://example.com/stream.m3u8"
    ============================================================
  -->
  <div
    id="lux-player"
    class="lux-player"
    data-src="https://www.w3schools.com/html/mov_bbb.mp4"
  >

    <!-- ── VIDEO ELEMENT ──────────────────────────────────────── -->
    <!--
      crossorigin="anonymous" is required so that WebVTT subtitle
      tracks fetched from a different origin don't trigger CORS errors.
    -->
    <video
      id="lux-video"
      class="lux-video"
      crossorigin="anonymous"
      playsinline
    ></video>

    <!-- ── SUBTITLE DISPLAY ───────────────────────────────────── -->
    <!--
      Cue text is injected here by player.js.
      Positioned above the control bar via CSS.
    -->
    <div id="lux-subtitle" class="lux-subtitle" aria-live="polite"></div>

    <!-- ── SPINNER (buffering indicator) ─────────────────────── -->
    <div id="lux-spinner" class="lux-spinner" aria-hidden="true">
      <svg viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20" fill="none" stroke-width="4"/>
      </svg>
    </div>

    <!-- ── BIG PLAY BUTTON (shown before first play) ──────────── -->
    <button id="lux-big-play" class="lux-big-play" aria-label="Play">
      <!-- Play triangle -->
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>

    <!-- ══════════════════════════════════════════════════════════
         CONTROL BAR  (glassmorphism panel at the bottom)
         ══════════════════════════════════════════════════════════ -->
    <div id="lux-controls" class="lux-controls" role="toolbar" aria-label="Video controls">

      <!-- ── PROGRESS / SEEK BAR ───────────────────────────── -->
      <div class="lux-progress-wrapper" role="group" aria-label="Seek">
        <!-- Buffered (darker fill behind playhead) -->
        <div id="lux-buffered" class="lux-buffered"></div>
        <!-- Playhead fill -->
        <div id="lux-played"   class="lux-played"></div>
        <!-- Hidden native range for accessibility & click/drag -->
        <input
          id="lux-seek"
          class="lux-seek"
          type="range"
          min="0"
          max="100"
          value="0"
          step="0.01"
          aria-label="Seek"
        />
        <!-- Floating time tooltip shown on hover -->
        <div id="lux-seek-tooltip" class="lux-seek-tooltip" aria-hidden="true">0:00</div>
      </div>

      <!-- ── BOTTOM ROW ────────────────────────────────────── -->
      <div class="lux-bottom-row">

        <!-- Left cluster -->
        <div class="lux-left">

          <!-- Play / Pause -->
          <button id="lux-play-btn" class="lux-btn" aria-label="Play">
            <!-- Play icon (default) -->
            <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <!-- Pause icon (shown while playing) -->
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>

          <!-- Volume / Mute -->
          <div class="lux-volume-group">
            <button id="lux-mute-btn" class="lux-btn" aria-label="Mute">
              <!-- Volume high -->
              <svg class="icon-vol-high" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/>
              </svg>
              <!-- Volume low -->
              <svg class="icon-vol-low" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.5 12A4.5 4.5 0 0 0 16 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>
              </svg>
              <!-- Muted -->
              <svg class="icon-vol-mute" viewBox="0 0 24 24" fill="currentColor">
                <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 19 L19 17.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
              </svg>
            </button>
            <!-- Volume slider -->
            <input
              id="lux-volume"
              class="lux-volume-slider"
              type="range"
              min="0"
              max="1"
              step="0.01"
              value="1"
              aria-label="Volume"
            />
          </div>

          <!-- Time display -->
          <span class="lux-time" aria-live="off">
            <span id="lux-current">0:00</span>
            <span class="lux-time-sep">/</span>
            <span id="lux-duration">0:00</span>
          </span>
        </div>

        <!-- Right cluster -->
        <div class="lux-right">

          <!-- Closed Captions (CC) toggle -->
          <button id="lux-cc-btn" class="lux-btn" aria-label="Subtitles" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm-8 7H9.5v-.5h-2v3h2V13H11v1a2 2 0 0 1-4 0v-3a2 2 0 0 1 4 0v1zm7 0h-1.5v-.5h-2v3h2V13H18v1a2 2 0 0 1-4 0v-3a2 2 0 0 1 4 0v1z"/>
            </svg>
          </button>

          <!-- Settings (playback speed) -->
          <div class="lux-settings-wrapper">
            <button id="lux-settings-btn" class="lux-btn" aria-label="Settings" aria-expanded="false">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.0 7.0 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.44.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87a.47.47 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.47.47 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.03.7 1.62.94l.36 2.54c.03.24.23.41.47.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
              </svg>
            </button>

            <!-- Settings popup menu -->
            <div id="lux-settings-menu" class="lux-settings-menu" role="menu" aria-label="Playback settings" hidden>
              <p class="lux-menu-label">Playback Speed</p>
              <!-- Speed options — aria-checked reflects active selection -->
              <button class="lux-speed-btn"             data-speed="0.5"  role="menuitemradio" aria-checked="false">0.5×</button>
              <button class="lux-speed-btn lux-active"  data-speed="1"    role="menuitemradio" aria-checked="true" >1×</button>
              <button class="lux-speed-btn"             data-speed="1.5"  role="menuitemradio" aria-checked="false">1.5×</button>
              <button class="lux-speed-btn"             data-speed="2"    role="menuitemradio" aria-checked="false">2×</button>
            </div>
          </div>

          <!-- Picture-in-Picture -->
          <button id="lux-pip-btn" class="lux-btn" aria-label="Picture in Picture">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 1.98 2 1.98h18c1.1 0 2-.88 2-1.98V5c0-1.1-.9-2-2-2zm0 16.01H3V4.98h18v14.03z"/>
            </svg>
          </button>

          <!-- Fullscreen -->
          <button id="lux-fs-btn" class="lux-btn" aria-label="Fullscreen">
            <!-- Expand icon -->
            <svg class="icon-expand" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
            </svg>
            <!-- Compress icon (shown in fullscreen) -->
            <svg class="icon-compress" viewBox="0 0 24 24" fill="currentColor">
              <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
            </svg>
          </button>
        </div>
      </div><!-- /.lux-bottom-row -->
    </div><!-- /#lux-controls -->
  </div><!-- /#lux-player -->

  <!--
    ============================================================
    SUBTITLE FILE INPUT
    ------------------------------------------------------------
    Hidden file input; triggered by the CC button.
    Users browse for a local .vtt file which is read via
    FileReader and loaded as an object-URL text track.
    ============================================================
  -->
  <input
    id="lux-vtt-input"
    type="file"
    accept=".vtt,text/vtt"
    style="display:none"
    aria-hidden="true"
  />

  <!-- Player JavaScript module -->
  <script src="player.js"></script>
</body>
</html>
